name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect changed workspaces
        if: github.event_name == 'pull_request'
        id: changes
        shell: bash
        run: |
          files="$(git diff --name-only "${{ github.event.pull_request.base.sha }}...HEAD")"
          echo "$files"

          if echo "$files" | grep -q '^frontend/'; then
            echo "frontend=true" >> "$GITHUB_OUTPUT"
          else
            echo "frontend=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$files" | grep -q '^backend/'; then
            echo "backend=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: pnpm/action-setup@v2
        with:
          version: 9.15.9
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Work around npm optional dependency bug (Rollup Linux binary)
        run: pnpm --filter story-spark-ai-frontend add @rollup/rollup-linux-x64-gnu
      - name: Work around npm optional dependency bug (Lightning CSS Linux binary)
        run: pnpm --filter story-spark-ai-frontend add lightningcss-linux-x64-gnu
      - name: Build
        if: github.event_name != 'pull_request' || steps.changes.outputs.backend == 'true'
        run: pnpm run build
      - name: Validate changed frontend files
        if: github.event_name == 'pull_request' && steps.changes.outputs.frontend == 'true' && steps.changes.outputs.backend != 'true'
        shell: bash
        run: |
          files="$(git diff --name-only "${{ github.event.pull_request.base.sha }}...HEAD" | grep -E '^frontend/.*\.(ts|tsx)$' | sed 's#^frontend/##' || true)"
          if [ -z "$files" ]; then
            echo "No frontend TypeScript files changed."
            exit 0
          fi
          pnpm --filter story-spark-ai-frontend exec tsc \
            --noEmit \
            --jsx react-jsx \
            --moduleResolution bundler \
            --module ESNext \
            --target ES2020 \
            --lib ES2020,DOM,DOM.Iterable \
            --types vite/client \
            --skipLibCheck \
            --allowSyntheticDefaultImports \
            $files
