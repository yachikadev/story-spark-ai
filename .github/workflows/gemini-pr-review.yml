name: Gemini PR Reviewer

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Gemini PR Reviewer & Apply Auto-fixes
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "GEMINI_API_KEY is not configured; skipping Gemini PR review."
            exit 0
          fi
          python .github/scripts/gemini_pr_review.py

      - name: Commit and push auto-fixes
        run: |
          git config --global user.name "Sonu Sharma"
          git config --global user.email "sonusharma6-dsa@users.noreply.github.com"
          git add -A
          # Check if there are changes to commit
          if ! git diff --cached --quiet; then
            git commit -s -m "style(clean): auto-fix code style violations via Gemini"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          else
            echo "No violations to auto-fix."
          fi
